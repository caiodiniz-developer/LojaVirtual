<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopSphere — Descubra o novo em cada compra</title>

    <meta
      name="description"
      content="E-commerce moderno com tecnologia, moda, casa e muito mais. Frete simulado, cupons e as melhores ofertas."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ShopSphere" />
    <meta property="og:title" content="ShopSphere — Descubra o novo em cada compra" />
    <meta
      property="og:description"
      content="E-commerce moderno com as melhores ofertas em tecnologia, moda e casa."
    />
    <link rel="icon" href="/public/logo-pequena.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply the persisted theme before first paint to avoid a flash
      (function () {
        try {
          var stored = localStorage.getItem('shopsphere:theme');
          var dark =
            stored === 'dark' ||
            ((stored === 'system' || !stored) &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
